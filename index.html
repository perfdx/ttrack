<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KETTE.KURVE.KONTEXT · Tour Transalp 2026 Live</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo/logo.svg" />

  <!-- Leaflet (OpenStreetMap-Karte) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="css/widget.css" />
</head>
<body>
  <!-- ===== Einbettbares Widget ===== -->
  <div id="tt-widget" class="tt-widget">
    <header class="tt-header">
      <div class="tt-title">
        <a class="tt-logo-link" href="https://kette-kurve-kontext.onepage.me/" target="_blank" rel="noopener noreferrer" title="kette.kurve.kontext">
          <img class="tt-logo" src="assets/logo/logo.svg" alt="KETTE.KURVE.KONTEXT" />
        </a>
        <span id="title">Tour Transalp 2026</span>
        <span id="status" class="badge live">LIVE</span>
      </div>
      <div class="tt-controls">
        <div id="map-toggle" class="map-toggle" role="group" aria-label="Kartenansicht 2D oder 3D">
          <button type="button" data-mode="2d" aria-label="2D-Karte">2D</button>
          <button type="button" data-mode="3d" aria-label="3D-Karte">3D</button>
        </div>
        <button id="gear" title="Zeit-Simulator (Test)" hidden>⚙</button>
      </div>
    </header>

    <!-- Zwei Spalten: Inhalt links, Fahrerinnen-Roster rechts -->
    <div class="tt-body">
      <div class="tt-main">
        <div class="tt-stage">
          <span id="stage-name">—</span>
          <span id="stage-badge" class="stage-badge">—</span>
        </div>

        <!-- Karte + Countdown/Status-Overlay -->
        <div class="tt-mapwrap">
          <div id="map"></div>
          <div id="overlay" class="overlay"></div>
          <!-- Kompakter Fahrerinnen-Strip (nur auf Smartphones sichtbar) -->
          <div id="rider-strip" class="tt-rider-strip"></div>
        </div>

        <!-- Live-Kennzahlen -->
        <div class="tt-metrics">
          <div class="metric"><label>Distanz</label><span id="m-dist">– / – km</span></div>
          <div class="metric"><label>Tempo</label><span id="m-speed">– km/h</span></div>
          <div class="metric"><label>Höhe</label><span id="m-ele">– m</span></div>
          <div class="metric"><label>Steigung</label><span id="m-grade">– %</span></div>
          <div class="metric"><label>Restzeit</label><span id="m-remain">–</span></div>
          <div class="metric"><label>Ankunft</label><span id="m-arrival">–</span></div>
        </div>
        <div class="tt-progress"><div class="tt-progress-bar"><span id="m-progress"></span></div><span id="m-pct" class="tt-pct">0 %</span></div>

        <!-- Höhenprofil -->
        <div class="tt-elevation">
          <svg id="elevation"></svg>
        </div>
      </div>

      <!-- Fahrerinnen-Roster (Panini-/Radrenn-Stil) -->
      <aside id="roster" class="tt-roster"></aside>
    </div>

    <!-- Zeit-Simulator (Test-Werkzeug, normalerweise verborgen) -->
    <div id="sim-panel" class="sim-panel"></div>

    <footer class="tt-footer">
      <span>Anzeige in Ortszeit (CEST)</span>
      <button id="share-btn" class="share-btn" aria-label="Seite teilen – QR-Code anzeigen">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 12v-1a8 8 0 0 1 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 3l3 3-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="3" y="14" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.8"/>
          <rect x="10" y="14" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.8"/>
          <rect x="17" y="14" width="4" height="5" rx="1" stroke="currentColor" stroke-width="1.8"/>
          <rect x="3" y="3" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.8"/>
          <rect x="10" y="3" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.8"/>
        </svg>
      </button>
    </footer>
  </div>

  <!-- QR-Code-Overlay (Share / Teilen) -->
  <div id="qr-overlay" class="qr-overlay" role="dialog" aria-modal="true" aria-label="Seite teilen">
    <button id="qr-close" class="qr-close" aria-label="Schliessen">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><line x1="20" y1="4" x2="4" y2="20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
    </button>
    <div class="qr-box">
      <p class="qr-title">Seite teilen</p>
      <div id="qr-canvas"></div>
      <p class="qr-url">perfdx.github.io/ttrack</p>
    </div>
  </div>

  <script type="module" src="js/widget.js"></script>
  <script>
    (function () {
      var QR_URL = 'https://perfdx.github.io/ttrack/';
      var overlay = document.getElementById('qr-overlay');
      var shareBtn = document.getElementById('share-btn');
      var closeBtn = document.getElementById('qr-close');
      var canvas  = document.getElementById('qr-canvas');
      var qrReady = false;

      function openOverlay() {
        if (!qrReady) {
          var s = document.createElement('script');
          s.src = 'assets/js/qrcode.min.js';
          s.onload = function () {
            qrReady = true;
            canvas.innerHTML = '';
            new QRCode(canvas, { text: QR_URL, width: 280, height: 280, colorDark: '#1b5376', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
            overlay.classList.add('show');
          };
          document.head.appendChild(s);
        } else {
          canvas.innerHTML = '';
          new QRCode(canvas, { text: QR_URL, width: 280, height: 280, colorDark: '#1b5376', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
          overlay.classList.add('show');
        }
      }

      function closeOverlay() { overlay.classList.remove('show'); }

      if (shareBtn) shareBtn.addEventListener('click', openOverlay);
      if (closeBtn) closeBtn.addEventListener('click', closeOverlay);
      if (overlay) overlay.addEventListener('click', function (e) { if (e.target === overlay) closeOverlay(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeOverlay(); });
    })();
  </script>

  <!-- GoatCounter: cookielose Besucherstatistik (https://www.goatcounter.com).
       Dashboard: https://ttrack2026.goatcounter.com · localhost wird nicht gezählt. -->
  <script data-goatcounter="https://ttrack2026.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
